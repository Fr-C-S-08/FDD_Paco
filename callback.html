<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>conectando con spotify...</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #F2EAD8;
    color: #1C2230;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
  }
  .msg { font-size: 24px; }
  .sub { font-size: 14px; color: #4A5060; margin-top: 12px; }
  .err { color: #C8392E; margin-top: 16px; font-size: 13px; max-width: 400px; text-align: center; }
</style>
</head>
<body>
  <div class="msg" id="msg">conectando con spotify…</div>
  <div class="sub">esto toma un segundo</div>
  <div class="err" id="err" hidden></div>

<script>
const CLIENT_ID = '9074170a641e46c8a361bc82bce924e5'; // Mismo Client ID que en script.js
const REDIRECT_URI = 'https://fr-c-s-08.github.io/FDD_Paco/callback.html';
const HOME = 'https://fr-c-s-08.github.io/FDD_Paco/';

async function exchangeCode() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const verifier = localStorage.getItem('spotify_code_verifier');

  if (error) {
    showError(`Spotify devolvió un error: ${error}`);
    return;
  }
  if (!code || !verifier) {
    showError('Faltan datos de autenticación');
    return;
  }

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    });

    const data = await res.json();

    if (!res.ok || !data.access_token) {
      showError(`Error: ${data.error_description || data.error || 'desconocido'}`);
      return;
    }

    localStorage.setItem('spotify_access_token', data.access_token);
    if (data.refresh_token) {
      localStorage.setItem('spotify_refresh_token', data.refresh_token);
    }
    localStorage.setItem('spotify_expires_at', Date.now() + (data.expires_in * 1000));
    localStorage.removeItem('spotify_code_verifier');

    document.getElementById('msg').textContent = '¡conectado! redirigiendo…';
    setTimeout(() => { window.location = HOME; }, 600);

  } catch (e) {
    showError(`Error de red: ${e.message}`);
  }
}

function showError(text) {
  document.getElementById('msg').textContent = 'no pude conectar';
  const err = document.getElementById('err');
  err.textContent = text;
  err.hidden = false;
  setTimeout(() => { window.location = HOME; }, 4000);
}

exchangeCode();
</script>
</body>
</html>
